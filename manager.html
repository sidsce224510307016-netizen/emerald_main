

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manager Dashboard - EMERALD</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --primary-yellow: #ffcc00;
  --primary-dark: #cc9900;
  --card-bg: #1e293b;
  --bg-dark: #0f172a;
  --text-light: #ffffff;
  --text-muted: #94a3b8;
  --success: #22c55e;
  --danger: #ef4444;
  --warning: #f59e0b;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg-dark);
  color: var(--text-light);
  min-height: 100vh;
  padding: 20px;
}

.header {
  text-align: center;
  margin-bottom: 40px;
}

.brand-name {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  color: var(--primary-yellow);
  letter-spacing: 3px;
  text-shadow: 0 4px 10px rgba(255, 204, 0, 0.3);
  margin-bottom: 10px;
}

.subtitle {
  font-size: 18px;
  color: var(--text-muted);
  font-weight: 500;
}

.dashboard-container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-header {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 20px;
  color: var(--text-light);
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-header::before {
  content: '';
  width: 4px;
  height: 28px;
  background: var(--primary-yellow);
  border-radius: 2px;
}

.tables-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
  margin-bottom: 50px;
}

.table-card {
  background: var(--card-bg);
  padding: 24px;
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  border: 2px solid transparent;
}

.table-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 25px rgba(0, 0, 0, 0.4);
}

.table-card.occupied {
  border-color: var(--primary-yellow);
}

.table-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.table-number {
  font-size: 20px;
  font-weight: 700;
  color: var(--primary-yellow);
}

.status-badge {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
}

.status-badge.free {
  background: rgba(34, 197, 94, 0.2);
  color: var(--success);
}

.status-badge.occupied {
  background: rgba(239, 68, 68, 0.2);
  color: var(--danger);
}

.table-info {
  margin-bottom: 16px;
}

.info-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
  font-size: 14px;
}

.info-label {
  color: var(--text-muted);
}

.info-value {
  color: var(--text-light);
  font-weight: 600;
}

.customer-details {
  background: rgba(255, 204, 0, 0.1);
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 16px;
  border-left: 3px solid var(--primary-yellow);
}

.customer-name {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-light);
  margin-bottom: 8px;
}

.customer-meta {
  display: flex;
  gap: 16px;
  font-size: 13px;
  color: var(--text-muted);
}

.free-btn {
  width: 100%;
  padding: 12px;
  background: var(--danger);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s ease;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.free-btn:hover {
  background: #dc2626;
  transform: scale(1.02);
}

.free-btn:active {
  transform: scale(0.98);
}

.queue-section {
  margin-top: 40px;
}

.queue-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.queue-card {
  background: var(--card-bg);
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-left: 4px solid var(--warning);
}

.queue-info {
  flex: 1;
}

.queue-name {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-light);
  margin-bottom: 8px;
}

.queue-meta {
  display: flex;
  gap: 20px;
  font-size: 14px;
  color: var(--text-muted);
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
  font-size: 16px;
}

.empty-state-icon {
  font-size: 64px;
  margin-bottom: 16px;
  opacity: 0.5;
}

@media (max-width: 768px) {
  .brand-name {
    font-size: 36px;
  }
  
  .tables-grid {
    grid-template-columns: 1fr;
  }
  
  body {
    padding: 15px;
  }
}
</style>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics-compat.js"></script>

<script>
// Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyC_LUKzINx6H4XE7uWoCpeLSldpIp-DR80",
  authDomain: "restro-4db49.firebaseapp.com",
  databaseURL: "https://restro-4db49-default-rtdb.firebaseio.com",
  projectId: "restro-4db49",
  storageBucket: "restro-4db49.firebasestorage.app",
  messagingSenderId: "860567729744",
  appId: "1:860567729744:web:773f5a315af7340d950355",
  measurementId: "G-D9CJCYZJF4"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const analytics = firebase.analytics();

/* 📊 LIVE DATA FOR MANAGER - Listen to tables and orders from Firebase */
db.ref("tables").on("value", (snapshot) => {
  const tablesData = snapshot.val();
  loadManagerData(tablesData);
});

db.ref("queue").on("value", (snapshot) => {
  const queueData = snapshot.val();
  // Will be loaded along with tables
});
</script>

</head>

<body>

<div class="header">
  <div class="brand-name">EMERALD</div>
  <div class="subtitle">Manager Dashboard</div>
</div>

<div class="dashboard-container">
  <h2 class="section-header">Tables Status</h2>
  <div id="tables" class="tables-grid"></div>

  <div class="queue-section">
    <h2 class="section-header">Waiting Queue</h2>
    <div id="queue" class="queue-list"></div>
  </div>
</div>

<script>
/* 📊 MANAGER DASHBOARD - FIREBASE SYNCED */
let allTables = [];
let allQueue = [];

// Initialize default tables in Firebase if not exists
function initializeTables() {
  db.ref("tables").once("value", (snapshot) => {
    if (!snapshot.exists()) {
      const defaultTables = [];
      for (let i = 1; i <= 10; i++) {
        defaultTables.push({
          number: i,
          capacity: i <= 4 ? 2 : i <= 8 ? 4 : 6,
          occupied: false,
          current: null
        });
      }
      db.ref("tables").set(defaultTables);
    }
  });

  db.ref("queue").once("value", (snapshot) => {
    if (!snapshot.exists()) {
      db.ref("queue").set([]);
    }
  });
}

// Load manager data from Firebase
function loadManagerData(tablesData) {
  if (tablesData) {
    allTables = Object.values(tablesData);
  }

  db.ref("queue").once("value", (snapshot) => {
    const queueData = snapshot.val();
    allQueue = queueData ? Object.values(queueData) : [];

    renderManagerDashboard();
  });
}

// Render the manager dashboard
function renderManagerDashboard() {
  const tablesDiv = document.getElementById("tables");
  const queueDiv = document.getElementById("queue");

  tablesDiv.innerHTML = "";
  queueDiv.innerHTML = "";

  if (allTables.length === 0) {
    tablesDiv.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">🪑</div>
        <div>No tables configured</div>
      </div>
    `;
    return;
  }

  allTables.forEach(t => {
    const occupiedClass = t.occupied ? 'occupied' : '';
    const statusClass = t.occupied ? 'occupied' : 'free';
    const statusText = t.occupied ? 'Occupied' : 'Free';

    let customerHTML = '';
    if (t.current) {
      const minutesSince = Math.floor((Date.now() - t.current.since) / 60000);
      customerHTML = `
        <div class="customer-details">
          <div class="customer-name">${t.current.name || 'Customer'}</div>
          <div class="customer-meta">
            <span>👥 ${t.current.people} ${t.current.people === 1 ? 'Person' : 'People'}</span>
            <span>⏱️ ${minutesSince} min</span>
          </div>
        </div>
        <button onclick="freeTable(${t.number})" class="free-btn">
          Free Table
        </button>
      `;
    }

    tablesDiv.innerHTML += `
      <div class="table-card ${occupiedClass}">
        <div class="table-header">
          <div class="table-number">Table ${t.number}</div>
          <div class="status-badge ${statusClass}">${statusText}</div>
        </div>
        <div class="table-info">
          <div class="info-row">
            <span class="info-label">Capacity</span>
            <span class="info-value">${t.capacity} ${t.capacity === 1 ? 'Person' : 'People'}</span>
          </div>
        </div>
        ${customerHTML}
      </div>
    `;
  });

  // Render queue
  if (allQueue.length === 0) {
    queueDiv.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📋</div>
        <div>No customers waiting</div>
      </div>
    `;
  } else {
    allQueue.forEach(q => {
      const waitingMinutes = Math.floor((Date.now() - (q.time || Date.now())) / 60000);
      queueDiv.innerHTML += `
        <div class="queue-card">
          <div class="queue-info">
            <div class="queue-name">${q.name || 'Customer'}</div>
            <div class="queue-meta">
              <span>👥 ${q.people} ${q.people === 1 ? 'Person' : 'People'}</span>
              <span>⏱️ Waiting ${waitingMinutes} min</span>
            </div>
          </div>
        </div>
      `;
    });
  }
}

/* 🔄 FREE TABLE - UPDATE IN FIREBASE */
function freeTable(tableNumber) {
  const table = allTables.find(t => t.number === tableNumber);

  if (table) {
    // First, get the current queue
    db.ref("queue").once("value", (snapshot) => {
      let queue = snapshot.val() ? Object.values(snapshot.val()) : [];

      // Mark table as free
      db.ref("tables/" + allTables.indexOf(table)).update({
        occupied: false,
        current: null
      });

      // Check if someone is waiting in queue
      if (queue.length > 0) {
        const nextCustomer = queue.shift();

        // Assign to freed table if capacity matches
        if (table.capacity >= nextCustomer.people) {
          db.ref("tables/" + allTables.indexOf(table)).update({
            occupied: true,
            current: {
              name: nextCustomer.name,
              people: nextCustomer.people,
              since: Date.now(),
              orderId: nextCustomer.orderId
            }
          });
          db.ref("queue").set(queue);
        } else {
          // Put back at front of queue if doesn't fit
          queue.unshift(nextCustomer);
          db.ref("queue").set(queue);
        }
      }
    });
  }
}

/* ➕ ADD TO QUEUE - For testing, can be triggered from menu */
function addToQueue(name, people) {
  db.ref("queue").once("value", (snapshot) => {
    let queue = snapshot.val() ? Object.values(snapshot.val()) : [];
    queue.push({
      name: name,
      people: parseInt(people),
      time: Date.now(),
      orderId: "ORD" + Date.now()
    });
    db.ref("queue").set(queue);
  });
}

// Initialize on load
initializeTables();
</script>

</body>
</html>
