<style>
:root {
  --primary-yellow: #ffcc00;
  --primary-dark: #cc9900;
  --card-bg: #1e293b;
  --bg-dark: #0f172a;
  --text-light: #ffffff;
  --text-muted: #94a3b8;
  --success: #22c55e;
  --danger: #ef4444;
  --warning: #f59e0b;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg-dark);
  color: var(--text-light);
  min-height: 100vh;
  padding: 20px;
}

.header {
  text-align: center;
  margin-bottom: 40px;
}

.brand-name {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  color: var(--primary-yellow);
  letter-spacing: 3px;
  text-shadow: 0 4px 10px rgba(255, 204, 0, 0.3);
  margin-bottom: 10px;
}

.subtitle {
  font-size: 18px;
  color: var(--text-muted);
  font-weight: 500;
}

.dashboard-container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-header {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 20px;
  color: var(--text-light);
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-header::before {
  content: '';
  width: 4px;
  height: 28px;
  background: var(--primary-yellow);
  border-radius: 2px;
}

.tables-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
  margin-bottom: 50px;
}

.table-card {
  background: var(--card-bg);
  padding: 24px;
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  border: 2px solid transparent;
}

.table-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 25px rgba(0, 0, 0, 0.4);
}

.table-card.occupied {
  border-color: var(--primary-yellow);
}

.table-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.table-number {
  font-size: 20px;
  font-weight: 700;
  color: var(--primary-yellow);
}

.status-badge {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
}

.status-badge.free {
  background: rgba(34, 197, 94, 0.2);
  color: var(--success);
}

.status-badge.occupied {
  background: rgba(239, 68, 68, 0.2);
  color: var(--danger);
}

.table-info {
  margin-bottom: 16px;
}

.info-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
  font-size: 14px;
}

.info-label {
  color: var(--text-muted);
}

.info-value {
  color: var(--text-light);
  font-weight: 600;
}

.customer-details {
  background: rgba(255, 204, 0, 0.1);
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 16px;
  border-left: 3px solid var(--primary-yellow);
}

.customer-name {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-light);
  margin-bottom: 8px;
}

.customer-meta {
  display: flex;
  gap: 16px;
  font-size: 13px;
  color: var(--text-muted);
}

.free-btn {
  width: 100%;
  padding: 12px;
  background: var(--danger);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s ease;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.free-btn:hover {
  background: #dc2626;
  transform: scale(1.02);
}

.free-btn:active {
  transform: scale(0.98);
}

.queue-section {
  margin-top: 40px;
}

.queue-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.queue-card {
  background: var(--card-bg);
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-left: 4px solid var(--warning);
}

.queue-info {
  flex: 1;
}

.queue-name {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-light);
  margin-bottom: 8px;
}

.queue-meta {
  display: flex;
  gap: 20px;
  font-size: 14px;
  color: var(--text-muted);
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
  font-size: 16px;
}

.empty-state-icon {
  font-size: 64px;
  margin-bottom: 16px;
  opacity: 0.5;
}

@media (max-width: 768px) {
  .brand-name {
    font-size: 36px;
  }
  
  .tables-grid {
    grid-template-columns: 1fr;
  }
  
  body {
    padding: 15px;
  }
}
</style>

<div class="header">
  <div class="brand-name">EMERALD</div>
  <div class="subtitle">Manager Dashboard</div>

<div class="dashboard-container">
  <h2 class="section-header">Tables Status</h2>
  <div id="tables" class="tables-grid"></div>

  <div class="queue-section">
    <h2 class="section-header">Waiting Queue</h2>
    <div id="queue" class="queue-list"></div>
  </div>
</div>

<script>
function loadManagerData() {
  const tables = JSON.parse(localStorage.getItem("emeraldTables") || "[]");
  const queue = JSON.parse(localStorage.getItem("emeraldQueue") || "[]");
  
  // Initialize tables if empty
  if (tables.length === 0) {
    for (let i = 1; i <= 10; i++) {
      tables.push({
        number: i,
        capacity: i <= 4 ? 2 : i <= 8 ? 4 : 6,
        occupied: false,
        current: null
      });
    }
    localStorage.setItem("emeraldTables", JSON.stringify(tables));
  }

  const data = { tables, queue };

  const tablesDiv = document.getElementById("tables");
  const queueDiv = document.getElementById("queue");

  tablesDiv.innerHTML = "";
  queueDiv.innerHTML = "";

  data.tables.forEach(t => {
    const occupiedClass = t.occupied ? 'occupied' : '';
    const statusClass = t.occupied ? 'occupied' : 'free';
    const statusText = t.occupied ? 'Occupied' : 'Free';
    
    let customerHTML = '';
    if (t.current) {
      const minutesSince = Math.floor((Date.now() - t.current.since) / 60000);
      customerHTML = `
        <div class="customer-details">
          <div class="customer-name">${t.current.name}</div>
          <div class="customer-meta">
            <span>👥 ${t.current.people} ${t.current.people === 1 ? 'Person' : 'People'}</span>
            <span>⏱️ ${minutesSince} min</span>
          </div>
        </div>
        <button onclick="freeTable(${t.number})" class="free-btn">
          Free Table
        </button>
      `;
    }

    tablesDiv.innerHTML += `
      <div class="table-card ${occupiedClass}">
        <div class="table-header">
          <div class="table-number">Table ${t.number}</div>
          <div class="status-badge ${statusClass}">${statusText}</div>
        </div>
        <div class="table-info">
          <div class="info-row">
            <span class="info-label">Capacity</span>
            <span class="info-value">${t.capacity} ${t.capacity === 1 ? 'Person' : 'People'}</span>
          </div>
        </div>
        ${customerHTML}
      </div>
    `;
  });

  if (data.queue.length === 0) {
    queueDiv.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📋</div>
        <div>No customers waiting</div>
      </div>
    `;
  } else {
    data.queue.forEach(q => {
      const waitingMinutes = Math.floor((Date.now() - q.time) / 60000);
      queueDiv.innerHTML += `
        <div class="queue-card">
          <div class="queue-info">
            <div class="queue-name">${q.name}</div>
            <div class="queue-meta">
              <span>👥 ${q.people} ${q.people === 1 ? 'Person' : 'People'}</span>
              <span>⏱️ Waiting ${waitingMinutes} min</span>
            </div>
          </div>
        </div>
      `;
    });
  }
}

function freeTable(tableNumber) {
  const tables = JSON.parse(localStorage.getItem("emeraldTables") || "[]");
  const table = tables.find(t => t.number === tableNumber);
  
  if (table) {
    table.occupied = false;
    table.current = null;
    localStorage.setItem("emeraldTables", JSON.stringify(tables));
    
    // Check if someone is waiting in queue
    const queue = JSON.parse(localStorage.getItem("emeraldQueue") || "[]");
    if (queue.length > 0) {
      const nextCustomer = queue.shift(); // Remove first from queue
      
      // Assign to freed table if capacity matches
      if (table.capacity >= nextCustomer.people) {
        table.occupied = true;
        table.current = {
          name: nextCustomer.name,
          people: nextCustomer.people,
          since: Date.now(),
          orderId: nextCustomer.orderId
        };
        localStorage.setItem("emeraldTables", JSON.stringify(tables));
      } else {
        queue.unshift(nextCustomer); // Put back if doesn't fit
      }
      
      localStorage.setItem("emeraldQueue", JSON.stringify(queue));
    }
    
    loadManagerData();
  }
}

loadManagerData();
setInterval(loadManagerData, 5000);
</script>
