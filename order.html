
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kitchen Dashboard - EMERALD</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --primary-yellow: #ffcc00;
  --primary-dark: #cc9900;
  --card-bg: #1e293b;
  --bg-dark: #111827;
  --text-light: #ffffff;
  --text-muted: #9ca3af;
  --success: #22c55e;
  --warning: #facc15;
  --jain: #fbbf24;
  --swaminarayan: #60a5fa;
  --regular: #22c55e;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg-dark);
  color: var(--text-light);
  min-height: 100vh;
  padding: 20px;
}

.header {
  text-align: center;
  margin-bottom: 40px;
}

.brand-name {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  color: var(--primary-yellow);
  letter-spacing: 3px;
  text-shadow: 0 4px 10px rgba(255, 204, 0, 0.3);
  margin-bottom: 10px;
}

.subtitle {
  font-size: 18px;
  color: var(--text-muted);
  font-weight: 500;
}

.orders-container {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
  gap: 24px;
}

.order-card {
  background: var(--card-bg);
  padding: 24px;
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  border: 2px solid transparent;
}

.order-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
}

.order-card.preparing { border-color: var(--warning); }
.order-card.ready     { border-color: var(--success); }

.order-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 20px;
}

.order-info { flex: 1; }

.table-number {
  font-size: 28px;
  font-weight: 700;
  color: var(--primary-yellow);
  margin-bottom: 4px;
}

/* ── Real Firebase Order ID chip ── */
.order-id-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,204,0,0.12);
  border: 1px solid rgba(255,204,0,0.3);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 11px;
  font-weight: 700;
  color: var(--primary-yellow);
  letter-spacing: 0.5px;
  margin-bottom: 8px;
  font-family: 'Courier New', monospace;
}
.order-id-chip svg {
  width: 12px;
  height: 12px;
  flex-shrink: 0;
}

.diet-badge {
  display: inline-block;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}
.diet-badge.jain         { background: rgba(251,191,36,0.2); color: var(--jain); }
.diet-badge.swaminarayan { background: rgba(96,165,250,0.2); color: var(--swaminarayan); }
.diet-badge.regular      { background: rgba(34,197,94,0.2);  color: var(--regular); }

.status-indicator {
  font-size: 14px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}
.status-indicator.preparing { color: var(--warning); }
.status-indicator.ready     { color: var(--success); }

.status-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}
.status-indicator.preparing .status-dot { background: var(--warning); }
.status-indicator.ready     .status-dot { background: var(--success); }

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.5; transform: scale(1.2); }
}

/* ── Right-side action column ── */
.order-action {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 10px;
}

.ready-btn {
  padding: 12px 20px;
  background: var(--success);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s ease;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  box-shadow: 0 4px 12px rgba(34,197,94,0.3);
  white-space: nowrap;
}
.ready-btn:hover  { background: #16a34a; transform: translateY(-2px); box-shadow: 0 6px 16px rgba(34,197,94,0.4); }
.ready-btn:active { transform: translateY(0); }

/* ── Print KOT button ── */
.print-btn {
  padding: 10px 16px;
  background: transparent;
  color: var(--primary-yellow);
  border: 1.5px solid rgba(255,204,0,0.4);
  border-radius: 10px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s ease;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.print-btn:hover  { background: rgba(255,204,0,0.12); border-color: var(--primary-yellow); transform: translateY(-2px); }
.print-btn:active { transform: translateY(0); }
.print-btn svg    { width: 14px; height: 14px; }

.ready-label {
  font-size: 14px;
  font-weight: 700;
  color: var(--success);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.ready-label::before {
  content: '✓';
  display: flex;
  align-items: center;
  justify-content: center;
  width: 24px;
  height: 24px;
  background: var(--success);
  color: white;
  border-radius: 50%;
  font-weight: 900;
}

.items-list {
  list-style: none;
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.1);
}

.item-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  color: #d1d5db;
  font-size: 15px;
}
.item-name { flex: 1; }
.item-qty  { font-weight: 700; color: var(--primary-yellow); margin-left: 12px; min-width: 40px; text-align: right; }

.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 80px 20px;
  color: var(--text-muted);
}
.empty-state-icon { font-size: 80px; margin-bottom: 20px; opacity: 0.5; }
.empty-state-text { font-size: 18px; font-weight: 500; }

@media (max-width: 768px) {
  .brand-name { font-size: 36px; }
  .orders-container { grid-template-columns: 1fr; }
  body { padding: 15px; }
}

/* ══════════════════════════════════════
   KOT PRINT STYLES  (only active during window.print())
   ══════════════════════════════════════ */
#kot-print-area {
  display: none;
}

@media print {
  /* Hide everything except the KOT slip */
  body > *          { display: none !important; }
  #kot-print-area   { display: block !important; }

  #kot-print-area {
    font-family: 'Courier New', Courier, monospace;
    color: #000;
    width: 80mm;
    margin: 0 auto;
    padding: 6mm 4mm;
    font-size: 13px;
    line-height: 1.6;
  }

  .kot-restaurant {
    text-align: center;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 4px;
    border-bottom: 2px dashed #000;
    padding-bottom: 6px;
    margin-bottom: 6px;
  }

  .kot-title {
    text-align: center;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .kot-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 4px;
  }

  .kot-divider {
    border: none;
    border-top: 1px dashed #000;
    margin: 8px 0;
  }

  .kot-items-header {
    display: flex;
    justify-content: space-between;
    font-weight: 900;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .kot-item-line {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 2px 0;
  }

  .kot-item-name { flex: 1; }
  .kot-item-qty  { font-weight: 900; min-width: 30px; text-align: right; }

  .kot-footer {
    text-align: center;
    font-size: 11px;
    margin-top: 10px;
    border-top: 2px dashed #000;
    padding-top: 6px;
    letter-spacing: 1px;
  }

  .kot-timestamp {
    text-align: center;
    font-size: 11px;
    color: #444;
    margin-top: 4px;
  }
}
</style>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyC_LUKzINx6H4XE7uWoCpeLSldpIp-DR80",
  authDomain: "restro-4db49.firebaseapp.com",
  databaseURL: "https://restro-4db49-default-rtdb.firebaseio.com",
  projectId: "restro-4db49",
  storageBucket: "restro-4db49.firebasestorage.app",
  messagingSenderId: "860567729744",
  appId: "1:860567729744:web:773f5a315af7340d950355",
  measurementId: "G-D9CJCYZJF4"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const analytics = firebase.analytics();
</script>
</head>

<body>

<div class="header">
  <div class="brand-name">EMERALD</div>
  <div class="subtitle">Kitchen Dashboard</div>
</div>

<div id="ordersContainer" class="orders-container">
  <div class="empty-state">
    <div class="empty-state-icon">🍳</div>
    <div class="empty-state-text">Loading orders...</div>
  </div>
</div>

<!-- Hidden KOT slip that gets populated before printing -->
<div id="kot-print-area"></div>

<script>
/* ══════════════════════════════
   LIVE FIREBASE LISTENER
   ══════════════════════════════ */
db.ref("orders").on("value", (snapshot) => {
  renderOrders(snapshot.val());
});

/* ══════════════════════════════
   RENDER ORDER CARDS
   ══════════════════════════════ */
function renderOrders(data) {
  const container = document.getElementById("ordersContainer");
  container.innerHTML = "";

  if (!data) {
    container.innerHTML = emptyState("No active orders");
    return;
  }

  const orders = Object.values(data).filter(
    o => o.status !== "Completed" && o.status !== "Cancelled"
  );

  if (orders.length === 0) {
    container.innerHTML = emptyState("No active orders");
    return;
  }

  orders.forEach(order => {
    const isReady     = order.status === "Ready";
    const statusClass = isReady ? "ready" : "preparing";
    const statusText  = isReady ? "Ready to Serve" : "Preparing";

    let dietClass = "regular";
    if (order.diet === "Jain")        dietClass = "jain";
    if (order.diet === "Swaminarayan") dietClass = "swaminarayan";

    // ── Real Firebase key displayed as Order ID ──
    const realId     = order.id || "—";
    const shortId    = realId.length > 16 ? realId.slice(-12).toUpperCase() : realId.toUpperCase();

    // ── Table / Takeaway label ──
    const tableLabel = order.orderType === "dinein"
      ? "Table " + (order.tableNumber || "—")
      : "Takeaway";

    const actionHTML = !isReady
      ? `<button onclick="markReady('${realId}')" class="ready-btn">Mark as Ready</button>`
      : `<div class="ready-label">Order Ready</div>`;

    const itemsHTML = Array.isArray(order.items)
      ? order.items.map(i => `
          <li class="item-row">
            <span class="item-name">${i.name}</span>
            <span class="item-qty">× ${i.qty}</span>
          </li>`).join("")
      : "";

    const card = document.createElement("div");
    card.className = `order-card ${statusClass}`;
    card.innerHTML = `
      <div class="order-header">
        <div class="order-info">
          <div class="table-number">${tableLabel}</div>

          <div class="order-id-chip">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/>
            </svg>
            ${shortId}
          </div>

          <div style="font-size:13px; color:#9ca3af; margin-bottom:6px;">${order.customerName || ""}</div>
          <div class="diet-badge ${dietClass}">${order.diet || "Regular"}</div>
          <div class="status-indicator ${statusClass}">
            <div class="status-dot"></div>
            <span>${statusText}</span>
          </div>
        </div>

        <div class="order-action">
          ${actionHTML}
          <button class="print-btn" onclick="printKOT('${realId}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/>
            </svg>
            Print KOT
          </button>
        </div>
      </div>
      <ul class="items-list">${itemsHTML}</ul>
    `;
    container.appendChild(card);
  });
}

/* ══════════════════════════════
   MARK ORDER READY
   ══════════════════════════════ */
function markReady(orderId) {
  db.ref("orders/" + orderId).update({ status: "Ready" })
    .catch(err => console.error("Error updating order:", err));
}

/* ══════════════════════════════
   PRINT KOT
   ══════════════════════════════ */
function printKOT(orderId) {
  db.ref("orders/" + orderId).once("value", (snap) => {
    const o = snap.val();
    if (!o) { alert("Order not found."); return; }

    const tableLabel = o.orderType === "dinein"
      ? "Table: " + (o.tableNumber || "—")
      : "Takeaway";

    const now = new Date();
    const dateStr = now.toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" });
    const timeStr = now.toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit", hour12: true });

    const itemsHTML = Array.isArray(o.items)
      ? o.items.map(i => `
          <div class="kot-item-line">
            <span class="kot-item-name">${i.name}</span>
            <span class="kot-item-qty">x${i.qty}</span>
          </div>`).join("")
      : "<div>No items</div>";

    // Use the full Firebase key as the Order ID on the slip
    const printSlip = document.getElementById("kot-print-area");
    printSlip.innerHTML = `
      <div class="kot-restaurant">EMERALD</div>
      <div class="kot-title">— KITCHEN ORDER TICKET —</div>

      <div class="kot-meta">
        <span><strong>Order ID:</strong></span>
        <span>${orderId}</span>
      </div>
      <div class="kot-meta">
        <span><strong>${tableLabel}</strong></span>
        <span>${o.customerName || "—"}</span>
      </div>
      <div class="kot-meta">
        <span><strong>Diet:</strong></span>
        <span>${o.diet || "Regular"}</span>
      </div>
      <div class="kot-meta">
        <span><strong>Type:</strong></span>
        <span>${o.orderType === "dinein" ? "Dine In" : "Takeaway"}</span>
      </div>

      <hr class="kot-divider"/>

      <div class="kot-items-header">
        <span>Item</span>
        <span>Qty</span>
      </div>
      <hr class="kot-divider"/>

      ${itemsHTML}

      <hr class="kot-divider"/>

      <div class="kot-footer">*** KITCHEN COPY ***</div>
      <div class="kot-timestamp">${dateStr} &nbsp; ${timeStr}</div>
    `;

    window.print();
  });
}

/* ══════════════════════════════
   HELPERS
   ══════════════════════════════ */
function emptyState(msg) {
  return `<div class="empty-state">
    <div class="empty-state-icon">🍳</div>
    <div class="empty-state-text">${msg}</div>
  </div>`;
}
</script>
</body>
</html>
